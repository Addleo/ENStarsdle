<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ENstars Guessing Game</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .dropdown { position: relative; display: inline-block; width: 300px; }
  input { width: 100%; padding: 8px; box-sizing: border-box; }
  .dropdown-content {
    display: none;
    position: absolute;
    background-color: #fff;
    border: 1px solid #ccc;
    max-height: 300px;
    overflow-y: auto;
    width: 100%;
    z-index: 10;
  }
  .dropdown-content div {
    padding: 5px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  .dropdown-content div:hover { background-color: #f0f0f0; }
  .dropdown-content img {
    width: 30px;
    height: 30px;
    margin-right: 8px;
    object-fit: cover;
    border-radius: 50%;
  }
  .feedback { margin-top: 20px; }
  .feedback div { margin-bottom: 5px; padding: 4px; border-radius: 4px; }
  .correct { background-color: #a8e6a1; } /* green */
  .wrong { background-color: #f5a8a8; }   /* red */
</style>
</head>
<body>

<h1>ENstars Guessing Game</h1>

<div class="dropdown">
  <input type="text" id="guessInput" placeholder="Type to guess a character">
  <div class="dropdown-content" id="dropdown"></div>
</div>

<div class="feedback" id="feedback"></div>

<script>
// -------------------------
// CONFIG / DATA
// -------------------------
let characters = [];
let dropdown = document.getElementById('dropdown');
let input = document.getElementById('guessInput');
let feedbackDiv = document.getElementById('feedback');
let dailyCharacter = null;
let remainingCharacters = [];

// Load characters.json
fetch('characters.json')
  .then(res => res.json())
  .then(data => {
    characters = data;
    console.log(`Loaded ${characters.length} characters`);
    
    // Flatten hobbies & specialties
    characters.forEach(c => {
      c.hobbies = c.hobbies?.[0]?.value?.map(v => v.toLowerCase()) || [];
      c.specialties = c.specialties?.[0]?.value?.map(v => v.toLowerCase()) || [];
    });

    // Clone for remaining dropdown
    remainingCharacters = [...characters];

    pickDailyCharacter();
    initDropdown();
  })
  .catch(err => {
    console.error('Error loading characters.json:', err);
    dropdown.innerHTML = `<div style="color:red;">Error loading characters.json. Check console.</div>`;
  });

// -------------------------
// PICK DAILY CHARACTER
// -------------------------
function pickDailyCharacter() {
  if (characters.length === 0) return;
  const index = Math.floor(Math.random() * characters.length);
  dailyCharacter = characters[index];
  console.log('Daily character:', dailyCharacter.first_name, dailyCharacter.last_name);
}

// -------------------------
// DROPDOWN / AUTOCOMPLETE
// -------------------------
function initDropdown() {
  renderDropdown(remainingCharacters);
  input.addEventListener('input', onInput);
  input.addEventListener('focus', () => dropdown.style.display = 'block');
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) dropdown.style.display = 'none';
  });
}

function renderDropdown(list) {
  dropdown.innerHTML = '';
  if (list.length === 0) {
    const div = document.createElement('div');
    div.textContent = 'No matches';
    dropdown.appendChild(div);
    return;
  }

  list.forEach(c => {
    const div = document.createElement('div');
    const img = document.createElement('img');
    img.src = `./images/${c.first_name}_${c.last_name}/icon.png`;
    img.onerror = () => { img.style.display = 'none'; };
    div.appendChild(img);
    div.appendChild(document.createTextNode(`${c.first_name} ${c.last_name}`));
    div.addEventListener('click', () => {
      input.value = `${c.first_name} ${c.last_name}`;
      dropdown.style.display = 'none';
      handleGuess(c);
    });
    dropdown.appendChild(div);
  });
}

function onInput() {
  const val = input.value.trim().toLowerCase();
  const filtered = remainingCharacters.filter(c =>
    c.first_name.toLowerCase().includes(val) ||
    c.last_name.toLowerCase().includes(val)
  );
  renderDropdown(filtered);
  dropdown.style.display = 'block';
}

// -------------------------
// HANDLE GUESS
// -------------------------
function handleGuess(guessChar) {
  // Remove guessed character from dropdown
  remainingCharacters = remainingCharacters.filter(c =>
    c.first_name !== guessChar.first_name || c.last_name !== guessChar.last_name
  );

  renderDropdown(remainingCharacters);

  // Clear input
  input.value = '';

  // Display feedback
  displayFeedback(guessChar);
}

function displayFeedback(guessChar) {
  feedbackDiv.innerHTML = '';

  function addFeedback(label, text, correct) {
    const div = document.createElement('div');
    div.textContent = text;
    div.className = correct ? 'correct' : 'wrong';
    feedbackDiv.appendChild(div);
  }

  // Height
  if (guessChar.height > dailyCharacter.height) addFeedback('Height', `< ${guessChar.height}`, false);
  else if (guessChar.height < dailyCharacter.height) addFeedback('Height', `> ${guessChar.height}`, false);
  else addFeedback('Height', `${guessChar.height}`, true);

  // Handedness
  addFeedback('Handedness', guessChar.handedness, guessChar.handedness === dailyCharacter.handedness);

  // School
  addFeedback('School', guessChar.school, guessChar.school === dailyCharacter.school);

  // Class
  addFeedback('Class', guessChar.class, guessChar.class === dailyCharacter.class);

  // Hobbies
  guessChar.hobbies.forEach(h => {
    addFeedback('Hobby', h, dailyCharacter.hobbies.includes(h));
  });

  // Specialties
  guessChar.specialties.forEach(s => {
    addFeedback('Specialty', s, dailyCharacter.specialties.includes(s));
  });
}
</script>
</body>
</html>
