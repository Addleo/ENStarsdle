<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ENStarsdle</title>
<link rel="icon" href="./images/icon.png" type="image/png">
<style>
body { font-family: sans-serif; padding: 20px; background: url('./images/background.png') no-repeat center center fixed; background-size: cover; display: flex;
    flex-direction: column;
    align-items: center;}
.dropdown { position: relative; display: inline-block; width: 300px; }
input { width: 100%; padding: 8px; box-sizing: border-box; }
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #fff;
  border: 1px solid #ccc;
  max-height: 300px;
  overflow-y: auto;
  width: 100%;
  z-index: 10;
}
.dropdown-content div {
  padding: 5px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.dropdown-content div:hover { background-color: #f0f0f0; }
.dropdown-content img {
  width: 30px;
  height: 30px;
  margin-right: 8px;
  object-fit: cover;
  border-radius: 50%;
}
.feedback {
  margin-top: 20px; }
.feedback div { text-align: center; border: 1px solid black; }
.feedback img { display: block; margin: 0 auto; }
.guess-row {
  display: flex;
  width: fit-content;
  margin-bottom: 10px;
  background: black;
  border-bottom-left-radius: 5px;
  border-top-right-radius: 5px;
}
.guess-cell {
  border: 1px solid black;
  width: 120px;          /* uniform width */
  height: 120px;          /* uniform height */
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  font-size: 14px;
}
.icon-cell { overflow: hidden; border-bottom-left-radius: 35px; }
.last-cell { border-top-right-radius: 35px; }
.correct { background-color: #a8e6a1; } /* green */
.wrong { background-color: #f5a8a8; }   /* red */
.daily { margin-top: 20px; border: 1px solid #ccc; padding: 10px; display:flex; align-items:center; width:fit-content;}
.daily img { width:40px;height:40px;margin-right:8px;border-radius:50%;}
button { margin-left:10px; padding:5px 10px; }
</style>
</head>
<body>

<h1>ENStarsdle</h1>

<div class="dropdown">
  <input type="text" id="guessInput" placeholder="Type to guess a character">
  <div class="dropdown-content" id="dropdown"></div>
</div>

<div class="feedback" id="feedback"></div>

<!-- Daily character display for testing -->
<div id="dailyDisplay" class="daily">
  <img id="dailyImg" src="" alt="Daily Character">
  <span id="dailyName"></span>
  <button id="rerollBtn">Reroll</button>
</div>

<script>
// -------------------------
// CONFIG / DATA
// -------------------------
let gameWon = false;
let characters = [];
let dropdown = document.getElementById('dropdown');
let input = document.getElementById('guessInput');
let feedbackDiv = document.getElementById('feedback');
let dailyCharacter = null;
let remainingCharacters = [];

// Daily character display elements
let dailyImg = document.getElementById('dailyImg');
let dailyName = document.getElementById('dailyName');
let rerollBtn = document.getElementById('rerollBtn');

// Load JSON
fetch('characters.json')
  .then(res => res.json())
  .then(data => {
    characters = data;
    console.log(`Loaded ${characters.length} characters`);

    remainingCharacters = [...characters];
    pickDailyCharacter();
    initDropdown();
  })
  .catch(err => {
    console.error('Error loading characters.json:', err);
    dropdown.innerHTML = `<div style="color:red;">Error loading characters.json. Check console.</div>`;
  });

// -------------------------
// PICK DAILY CHARACTER
// -------------------------
function pickDailyCharacter() {
  if (characters.length === 0) return;
  const index = Math.floor(Math.random() * characters.length);
  dailyCharacter = characters[index];
  console.log('Daily character:', dailyCharacter.first_name, dailyCharacter.last_name);
  updateDailyDisplay();
}

// Update daily display for testing
function updateDailyDisplay() {
  dailyName.textContent = `${dailyCharacter.first_name} ${dailyCharacter.last_name}`;
  dailyImg.src = `./images/characters/${dailyCharacter.first_name}_${dailyCharacter.last_name}/icon.png`;
  dailyImg.onerror = () => { dailyImg.style.display = 'none'; };
  dailyImg.style.display = 'block';
}

// Reroll button
rerollBtn.addEventListener('click', () => {
  pickDailyCharacter();
  remainingCharacters = characters.filter(c => c !== dailyCharacter); // reset remaining
  renderDropdown(remainingCharacters);
});

// -------------------------
// DROPDOWN / AUTOCOMPLETE
// -------------------------
function initDropdown() {
  renderDropdown(remainingCharacters);
  input.addEventListener('input', onInput);
  input.addEventListener('focus', () => dropdown.style.display = 'block');
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) dropdown.style.display = 'none';
  });
}

function renderDropdown(list) {
  dropdown.innerHTML = '';
  if (list.length === 0) {
    const div = document.createElement('div');
    div.textContent = 'No matches';
    dropdown.appendChild(div);
    return;
  }

  list.forEach(c => {
    const div = document.createElement('div');
    const img = document.createElement('img');
    img.src = `./images/characters/${c.first_name}_${c.last_name}/icon.png`;
    img.onerror = () => { img.style.display = 'none'; };
    div.appendChild(img);
    div.appendChild(document.createTextNode(`${c.first_name} ${c.last_name}`));
    div.addEventListener('click', () => {
      input.value = `${c.first_name} ${c.last_name}`;
      dropdown.style.display = 'none';
      handleGuess(c);
    });
    dropdown.appendChild(div);
  });
}

function onInput() {
  const val = input.value.trim().toLowerCase();
  const filtered = remainingCharacters.filter(c =>
    c.first_name.toLowerCase().includes(val) ||
    c.last_name.toLowerCase().includes(val)
  );
  renderDropdown(filtered);
  dropdown.style.display = 'block';
}

// -------------------------
// HANDLE GUESS AND WIN CHECK
// -------------------------
function handleGuess(guessChar) {

  if (gameWon) return; // prevent guessing after win

  remainingCharacters = remainingCharacters.filter(c =>
    c.first_name !== guessChar.first_name ||
    c.last_name !== guessChar.last_name
  );

  renderDropdown(remainingCharacters);
  input.value = '';

  displayFeedback(guessChar);

  // ✅ WIN CHECK
  if (
    guessChar.first_name === dailyCharacter.first_name &&
    guessChar.last_name === dailyCharacter.last_name
  ) {
    handleWin();
  }
}

function handleWin() {
  gameWon = true;

  // Disable input
  input.disabled = true;
  dropdown.style.display = 'none';

  // Optional: change placeholder text
  input.placeholder = "You guessed correctly! 🎉";

  console.log("You win!");
}

// -------------------------
// DISPLAY FEEDBACK
// -------------------------
function displayFeedback(guessChar) {

  const guessRow = document.createElement('div');
  guessRow.className = 'guess-row';

  function createCell(content, correct, extraClass = '') {
    const cell = document.createElement('div');
    cell.className = `guess-cell ${extraClass} ${correct ? 'correct' : 'wrong'}`;

    if (typeof content === 'string') {
      cell.textContent = content;
    } else {
      cell.appendChild(content);
    }

    return cell;
  }

  // FACE ICON (neutral color)
  const iconImg = document.createElement('img');
  iconImg.src = `./images/characters/${guessChar.first_name}_${guessChar.last_name}/icon.png`;
  iconImg.style.width = '110%';
  iconImg.style.height = '110%';
  iconImg.style.objectFit = 'cover';
  iconImg.onerror = () => iconImg.style.display = 'none';

  const iconCell = document.createElement('div');
  iconCell.className = 'guess-cell icon-cell';
  iconCell.appendChild(iconImg);

  guessRow.appendChild(iconCell);

  // HEIGHT
  let heightText = '?';
  let heightCorrect = false;

  if (dailyCharacter.height !== undefined && guessChar.height !== undefined) {
    if (guessChar.height > dailyCharacter.height) {
      heightText = `< ${guessChar.height}`;
    } else if (guessChar.height < dailyCharacter.height) {
      heightText = `> ${guessChar.height}`;
    } else {
      heightText = `${guessChar.height}`;
      heightCorrect = true;
    }
  }

  guessRow.appendChild(createCell(heightText, heightCorrect));

  // HANDEDNESS
  const handedness = guessChar.handedness ?? '?';
  guessRow.appendChild(
    createCell(handedness, handedness === dailyCharacter.handedness)
  );

  // SCHOOL
  const guessSchool = guessChar.school ?? 'Not in school';
  const correctSchool = dailyCharacter.school ?? 'Not in school';
  guessRow.appendChild(createCell(guessSchool, guessSchool === correctSchool));

  // CLASS
  const guessClass = guessChar.class ?? 'Not in school';
  const correctClass = dailyCharacter.class ?? 'Not in school';
  guessRow.appendChild(createCell(guessClass, guessClass === correctClass));

  // AGENCY
  const guessAgency = guessChar.agency ?? '?';
  const correctAgency = dailyCharacter.agency ?? '?';

  const agencyImg = document.createElement('img');
  agencyImg.style.width = '90%';
  agencyImg.style.height = '90%';
  agencyImg.style.objectFit = 'contain';

  if (guessAgency !== '?') {
    agencyImg.src = `./images/Agencies/${guessAgency}.png`;
    agencyImg.onerror = () => agencyImg.style.display = 'none';
  }

  guessRow.appendChild(createCell(agencyImg, guessAgency === correctAgency));

  // UNIT
  const guessUnit = guessChar.unit ?? '?';
  const correctUnit = dailyCharacter.unit ?? '?';

  const unitImg = document.createElement('img');
  unitImg.style.width = '90%';
  unitImg.style.height = '90%';
  unitImg.style.objectFit = 'contain';

  if (guessUnit !== '?') {
    if (guessUnit === 'Crazy:B') unitImg.src = `./images/Units/CrazyB.png`;
    else if (guessUnit === 'Ra*bits') unitImg.src = `./images/Units/Ra'bits.png`;
    else unitImg.src = `./images/Units/${guessUnit}.png`;

    unitImg.onerror = () => unitImg.style.display = 'none';
  }

  guessRow.appendChild(createCell(unitImg, guessUnit === correctUnit, 'last-cell'));

  feedbackDiv.appendChild(guessRow);
}
</script>
</body>
</html>
